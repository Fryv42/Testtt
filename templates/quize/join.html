{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#0d6efd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Присоединиться к квизу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 500px;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            .container {
                margin-top: 20px;
                padding-left: 16px;
                padding-right: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4 text-center">Присоединиться к квизу</h2>
        <form id="joinForm" novalidate>
            <div class="mb-3">
                <label for="sessionCode" class="form-label">Код сессии (6 символов, A-Z, 0-9)</label>
                <input type="text"
                        class="form-control"
                        id="sessionCode"
                        maxlength="6"
                        required
                        pattern="^[A-Z0-9]{6}$"
                        inputmode="text"
                        autocapitalize="characters"
                        autocomplete="off"
                        placeholder="Например: ABC123">
                <div class="invalid-feedback" id="sessionCodeError">Пожалуйста, введите корректный код из 6 символов (A-Z, 0-9).</div>
            </div>
            <div class="mb-3">
                <label for="participantName" class="form-label">Ваше имя (минимум 2 символа)</label>
                <input type="text"
                        class="form-control"
                        id="participantName"
                        required
                        minlength="2"
                        autocomplete="off"
                        inputmode="text"
                        placeholder="Ваше имя">
                <div class="invalid-feedback" id="nameError">Имя должно содержать минимум 2 символа.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Присоединиться</button>
        </form>
        <div class="mt-3 alert alert-danger d-none" role="alert" id="errorAlert"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('joinForm');
            const sessionInput = document.getElementById('sessionCode');
            const nameInput = document.getElementById('participantName');
            const errorAlert = document.getElementById('errorAlert');
            const pattern = /^[A-Z0-9]{6}$/;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearValidation();
                const sessionCode = sessionInput.value.trim().toUpperCase();
                const participantName = nameInput.value.trim();
                let valid = true;
                if (!pattern.test(sessionCode)) {
                    valid = false;
                    sessionInput.classList.add('is-invalid');
                }
                if (participantName.length < 2) {
                    valid = false;
                    nameInput.classList.add('is-invalid');
                }
                if (!valid) return;
                try {
                    const response = await fetch('/api/join', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: sessionCode, name: participantName })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        window.location.href = `/quiz/play/${sessionCode}`;
                    } else {
                        showError(data.message || 'Ошибка при подключении к сессии.');
                    }
                } catch (error) {
                    showError('Произошла ошибка сервера. Попробуйте позже.');
                }
            });
            function clearValidation() {
                sessionInput.classList.remove('is-invalid');
                nameInput.classList.remove('is-invalid');
                errorAlert.classList.add('d-none');
                errorAlert.innerText = '';
            }
            function showError(message) {
                errorAlert.classList.remove('d-none');
                errorAlert.innerText = message;
            }
        });
    </script>
</body>
</html>
