<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Создание квиза | QuizService</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    
    .navbar-brand {
      font-weight: 700;
    }
    
    .question-card {
      background: white;
      border-radius: 16px;
      border: 1px solid #dee2e6;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    
    .question-card:hover {
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
    
    .quiz-title-input, .quiz-desc-textarea, .question-input, .answer-input {
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    
    .quiz-title-input:focus, .quiz-desc-textarea:focus, 
    .question-input:focus, .answer-input:focus {
      border-color: #86b7fe;
      outline: 0;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    
    .quiz-title-input {
      font-size: 1.75rem;
      font-weight: 500;
      width: 100%;
    }
    
    .quiz-desc-textarea {
      font-size: 1rem;
      width: 100%;
      resize: vertical;
    }
    
    .question-input {
      font-size: 1.25rem;
      font-weight: 500;
      flex: 1;
    }
    
    .answer-input {
      flex: 1;
    }
    
    .section-header {
      background: white;
      border-radius: 16px;
      border: 1px solid #dee2e6;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .btn-add-answer {
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 10px;
    }
    
    .btn-add-answer:hover {
      background-color: #218838;
    }
    
    .btn-add-question {
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 0.375rem;
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-add-question:hover {
      background-color: #218838;
    }
    
    .btn-submit {
      background-color: #0d6efd;
      color: white;
      border: none;
      border-radius: 0.375rem;
      padding: 0.5rem 1.8rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-submit:hover {
      background-color: #0b5ed7;
    }
    
    .btn-remove-answer, .btn-remove-question {
      background-color: #dc3545;
      border: none;
      border-radius: 0.375rem;
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .btn-remove-answer svg, .btn-remove-question svg {
      width: 36px;
      height: 36px;
      fill: white;
      transition: transform 0.1s;
    }
    
    .btn-remove-answer:hover, .btn-remove-question:hover {
      background-color: #bb2d3b;
      transform: scale(1.02);
    }
    
    .correct-radio {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #198754;
      margin: 0;
      flex-shrink: 0;
    }
    
    .answer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .options-bar {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .flex-grow {
      flex: 1;
    }
    
    hr {
      opacity: 0.5;
      margin: 1rem 0;
    }
    
    .preview-mode .question-input,
    .preview-mode .answer-input,
    .preview-mode .quiz-title-input,
    .preview-mode .quiz-desc-textarea {
      background-color: #e9ecef;
      pointer-events: none;
      user-select: none;
      border-color: #ced4da;
      color: #212529;
    }
    
    .preview-mode .btn-remove-question,
    .preview-mode .btn-add-answer,
    .preview-mode .btn-remove-answer,
    .preview-mode .btn-add-question,
    .preview-mode .options-bar .btn-add-question,
    .preview-mode .options-bar .btn-submit {
      display: none !important;
    }
    
    .preview-mode .correct-radio {
      pointer-events: none;
      opacity: 0.8;
    }
    
    .preview-toggle-wrapper {
      background: white;
      border-radius: 40px;
      padding: 5px 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #dee2e6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    
    .preview-toggle-wrapper .form-check-input {
      cursor: pointer;
      width: 1rem;
      height: 1rem;
      margin-top: 0;
    }
    
    .preview-toggle-wrapper .form-check-label {
      font-weight: 500;
      cursor: pointer;
      color: #1e2a3a;
    }
    
    .alert-fixed {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      max-width: 400px;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @media (max-width: 768px) {
      .container {
        padding-left: 15px;
        padding-right: 15px;
      }
    }
    
    .js-off-alert {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background-color: #dc3545;
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<noscript>
  <div class="js-off-alert">
    ⚠️ Включите JavaScript для корректной работы сервиса создания квизов
  </div>
</noscript>

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">QuizService</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Переключить навигацию">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
        <li class="nav-item"><a class="nav-link active" href="/create">Создать квиз</a></li>
        <li class="nav-item"><a class="nav-link" href="/login">Войти</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4" id="quizBuilderContainer">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      
      <div class="text-center mb-4">
        <h1 class="display-5 fw-bold">Создание квиза</h1>
        <p class="lead text-muted">Создайте квиз и получите ссылку для приглашения участников</p>
      </div>
      
      <div class="d-flex justify-content-end mb-3">
        <div class="preview-toggle-wrapper">
          <input class="form-check-input" type="checkbox" id="previewToggle">
          <label class="form-check-label" for="previewToggle">Предпросмотр</label>
        </div>
      </div>
      
      <form id="quizForm">
        <div class="section-header">
          <input type="text" id="quizTitle" class="quiz-title-input" placeholder="Название квиза" autocomplete="off">
          <hr>
          <textarea id="quizDescription" class="quiz-desc-textarea" rows="3" placeholder="Описание квиза (необязательно)"></textarea>
        </div>
        
        <div id="questionsContainer"></div>
        
        <div class="options-bar">
          <button type="button" id="addQuestionBtn" class="btn-add-question">
            + Добавить вопрос
          </button>
          <div class="flex-grow"></div>
          <button type="submit" id="submitBtn" class="btn-submit">
            Создать квиз →
          </button>
        </div>
      </form>
      
    </div>
  </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
  <div class="container text-center">
    <p class="mb-1">&copy; 2024 QuizService. Все права защищены.</p>
    <p class="mb-0">Контакты: <a href="mailto:info@quizservice.com" class="text-white text-decoration-underline">info@quizservice.com</a></p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  class QuizBuilder {
    constructor() {
      this.questionsContainer = document.getElementById('questionsContainer');
      this.questionCounter = 0;
      this.previewMode = false;
      this.init();
    }
    
    init() {
      this.setupAutoSaveListeners();
      
      this.loadDraft();
      
      if (this.questionsContainer.children.length === 0) {
        this.addQuestion();
      }
      
      const addBtn = document.getElementById('addQuestionBtn');
      if (addBtn) {
        addBtn.addEventListener('click', () => this.addQuestion());
      }
      
      const form = document.getElementById('quizForm');
      if (form) {
        form.addEventListener('submit', (e) => this.handleSubmit(e));
      }
      
      const previewCheckbox = document.getElementById('previewToggle');
      if (previewCheckbox) {
        previewCheckbox.addEventListener('change', (e) => {
          this.previewMode = e.target.checked;
          this.togglePreviewMode();
        });
      }
    }
    
    setupAutoSaveListeners() {
      this.autoSaveDraft = this.debounce(() => this.saveDraft(), 500);
      
      const form = document.getElementById('quizForm');
      if (form) {
        form.addEventListener('input', (e) => {
          if (!this.previewMode) this.autoSaveDraft();
        });
      }
      
      const observer = new MutationObserver(() => {
        if (!this.previewMode) this.autoSaveDraft();
      });
      if (this.questionsContainer) {
        observer.observe(this.questionsContainer, { childList: true, subtree: true, attributes: true });
      }
    }
    
    debounce(func, wait) {
      let timeout;
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }
    
    saveDraft() {
      const quizData = this.collectRawData();
      if (quizData) {
        localStorage.setItem('quiz_draft', JSON.stringify(quizData));
      }
    }
    
    loadDraft() {
      const draft = localStorage.getItem('quiz_draft');
      if (!draft) return;
      try {
        const data = JSON.parse(draft);
        const titleInput = document.getElementById('quizTitle');
        const descInput = document.getElementById('quizDescription');
        if (titleInput && data.title !== undefined) titleInput.value = data.title;
        if (descInput && data.description !== undefined) descInput.value = data.description;
        
        if (data.questions && data.questions.length) {
          this.questionsContainer.innerHTML = '';
          this.questionCounter = 0;
          data.questions.forEach(q => {
            this.addQuestionFromData(q.text, q.answers);
          });
        }
      } catch(e) {
        console.warn('Ошибка загрузки черновика', e);
      }
    }
    
    collectRawData() {
      const title = document.getElementById('quizTitle')?.value || '';
      const description = document.getElementById('quizDescription')?.value || '';
      const questionsRaw = [];
      const cards = document.querySelectorAll('.question-card');
      for (let card of cards) {
        const qText = card.querySelector('.question-input')?.value || '';
        const answers = [];
        const answerItems = card.querySelectorAll('.answer-item');
        for (let ansItem of answerItems) {
          const ansText = ansItem.querySelector('.answer-input')?.value || '';
          const isCorrect = ansItem.querySelector('.correct-radio')?.checked || false;
          answers.push({ text: ansText, isCorrect });
        }
        questionsRaw.push({ text: qText, answers });
      }
      return { title, description, questions: questionsRaw };
    }
    
    addQuestionFromData(questionText = '', answersArray = null) {
      const questionId = this.questionCounter++;
      const answersData = answersArray || [
        { text: '', isCorrect: false },
        { text: '', isCorrect: false }
      ];
      const questionNode = this.createQuestionDOM(questionId, questionText, answersData);
      this.questionsContainer.appendChild(questionNode);
      this.bindQuestionEvents(questionNode, questionId);
      return questionNode;
    }
    
    addQuestion() {
      this.addQuestionFromData('', null);
      const lastQuestion = this.questionsContainer.lastElementChild;
      if (lastQuestion) lastQuestion.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (!this.previewMode) this.autoSaveDraft();
    }
    
    createQuestionDOM(questionId, questionText, answersData) {
      const div = document.createElement('div');
      div.className = 'question-card';
      div.setAttribute('data-question-id', questionId);
      
      const answersHtml = answersData.map((ans, idx) => {
        const checkedAttr = ans.isCorrect ? 'checked' : '';
        const escapedText = this.escapeHtml(ans.text);
        return `
          <div class="answer-item" data-answer-idx="${idx}">
            <input type="radio" name="correct_${questionId}" class="correct-radio" ${checkedAttr}>
            <input type="text" class="answer-input" placeholder="Вариант ответа ${idx + 1}" value="${escapedText}">
            <button type="button" class="btn-remove-answer" title="Удалить ответ">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
              </svg>
            </button>
          </div>
        `;
      }).join('');
      
      div.innerHTML = `
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
          <input type="text" class="question-input" placeholder="Введите вопрос" value="${this.escapeHtml(questionText)}">
          <button type="button" class="btn-remove-question" title="Удалить вопрос">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
              <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
            </svg>
          </button>
        </div>
        <hr>
        <div class="answers-container">
          ${answersHtml}
        </div>
        <button type="button" class="btn-add-answer">+ Добавить вариант ответа</button>
      `;
      return div;
    }
    
    bindQuestionEvents(questionNode, questionId) {
      const removeBtn = questionNode.querySelector('.btn-remove-question');
      if (removeBtn) {
        removeBtn.addEventListener('click', () => {
          if (this.previewMode) return;
          const allQuestions = document.querySelectorAll('.question-card');
          if (allQuestions.length === 1) {
            this.showNotification('Нельзя удалить единственный вопрос', 'warning');
            return;
          }
          questionNode.remove();
          if (!this.previewMode) this.autoSaveDraft();
        });
      }
      
      const addAnswerBtn = questionNode.querySelector('.btn-add-answer');
      const answersContainer = questionNode.querySelector('.answers-container');
      if (addAnswerBtn && answersContainer) {
        addAnswerBtn.addEventListener('click', () => {
          if (this.previewMode) return;
          const answerCount = answersContainer.querySelectorAll('.answer-item').length;
          if (answerCount >= 10) {
            this.showNotification('Максимум 10 вариантов ответа', 'warning');
            return;
          }
          const newAnswerDiv = document.createElement('div');
          newAnswerDiv.className = 'answer-item';
          newAnswerDiv.setAttribute('data-answer-idx', answerCount);
          newAnswerDiv.innerHTML = `
            <input type="radio" name="correct_${questionId}" class="correct-radio">
            <input type="text" class="answer-input" placeholder="Новый вариант ответа">
            <button type="button" class="btn-remove-answer" title="Удалить ответ">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
              </svg>
            </button>
          `;
          answersContainer.appendChild(newAnswerDiv);
          this.bindAnswerEvents(newAnswerDiv, questionId);
          if (!this.previewMode) this.autoSaveDraft();
        });
      }
      
      const existingAnswers = questionNode.querySelectorAll('.answer-item');
      existingAnswers.forEach(ans => this.bindAnswerEvents(ans, questionId));
    }
    
    bindAnswerEvents(answerElement, questionId) {
      const removeBtn = answerElement.querySelector('.btn-remove-answer');
      if (!removeBtn) return;
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (this.previewMode) return;
        const answersContainer = answerElement.closest('.answers-container');
        const answersCount = answersContainer.querySelectorAll('.answer-item').length;
        if (answersCount <= 2) {
          this.showNotification('Должно быть минимум 2 варианта ответа', 'warning');
          return;
        }
        const radio = answerElement.querySelector('.correct-radio');
        if (radio && radio.checked) {
          const remainingRadios = answersContainer.querySelectorAll('.correct-radio');
          if (remainingRadios.length > 1) {
            const firstOther = remainingRadios[0] !== radio ? remainingRadios[0] : remainingRadios[1];
            if (firstOther) firstOther.checked = true;
          }
        }
        answerElement.remove();
        if (!this.previewMode) this.autoSaveDraft();
      });
    }
    
    collectQuizData() {
      const title = document.getElementById('quizTitle').value.trim();
      if (!title) {
        this.showNotification('Введите название квиза', 'error');
        return null;
      }
      const description = document.getElementById('quizDescription').value.trim();
      const questions = [];
      const cards = document.querySelectorAll('.question-card');
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        const qText = card.querySelector('.question-input').value.trim();
        if (!qText) {
          this.showNotification(`Вопрос ${i+1}: введите текст вопроса`, 'error');
          return null;
        }
        const answers = [];
        const answerItems = card.querySelectorAll('.answer-item');
        let hasCorrect = false;
        let correctIdx = -1;
        for (let j = 0; j < answerItems.length; j++) {
          const ansInput = answerItems[j].querySelector('.answer-input');
          const ansText = ansInput.value.trim();
          if (!ansText) {
            this.showNotification(`Вопрос ${i+1}: заполните все варианты ответов`, 'error');
            return null;
          }
          const isCorrect = answerItems[j].querySelector('.correct-radio').checked;
          answers.push({ text: ansText, isCorrect });
          if (isCorrect) {
            hasCorrect = true;
            correctIdx = j;
          }
        }
        if (!hasCorrect) {
          this.showNotification(`Вопрос ${i+1}: отметьте правильный вариант ответа`, 'error');
          return null;
        }
        if (answers.length < 2) {
          this.showNotification(`Вопрос ${i+1}: минимум 2 варианта ответа`, 'error');
          return null;
        }
        questions.push({
          text: qText,
          answers: answers,
          correctAnswer: correctIdx
        });
      }
      if (questions.length === 0) {
        this.showNotification('Добавьте хотя бы один вопрос', 'error');
        return null;
      }
      return { title, description, questions };
    }
    
    async handleSubmit(e) {
      e.preventDefault();
      if (this.previewMode) {
        this.showNotification('Выключите режим предпросмотра для создания квиза', 'warning');
        return;
      }
      const quizData = this.collectQuizData();
      if (!quizData) return;
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '⏳ Отправка...';
      submitBtn.disabled = true;
      
      try {
        const payload = {
          title: quizData.title,
          description: quizData.description,
          questions: quizData.questions.map(q => ({
            text: q.text,
            answers: q.answers.map(a => ({ text: a.text, isCorrect: a.isCorrect })),
            correctAnswer: q.correctAnswer
          }))
        };
        
        const response = await fetch('/api/v1/quizzes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          let errorMsg = 'Ошибка сервера';
          try {
            const errData = await response.json();
            errorMsg = errData.message || errData.error || 'Не удалось создать квиз';
          } catch(e) {}
          throw new Error(errorMsg);
        }
        
        const result = await response.json();
        const sessionId = result.sessionId;
        if (!sessionId) throw new Error('Сервер не вернул sessionId');
        
        localStorage.removeItem('quiz_draft');
        this.showNotification(`Квиз "${quizData.title}" успешно создан!`, 'success');
        setTimeout(() => {
          window.location.href = `/quiz/play/${sessionId}`;
        }, 1200);
        
      } catch (error) {
        console.error('API Error:', error);
        this.showNotification(error.message || 'Ошибка при создании квиза. Попробуйте позже.', 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    }
    
    togglePreviewMode() {
      const container = document.getElementById('quizBuilderContainer');
      if (this.previewMode) {
        container.classList.add('preview-mode');
      } else {
        container.classList.remove('preview-mode');
      }
    }
    
    showNotification(message, type = 'info') {
      const existing = document.querySelector('.alert-fixed');
      if (existing) existing.remove();
      const alertDiv = document.createElement('div');
      const bsClass = type === 'error' ? 'danger' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'info';
      alertDiv.className = `alert alert-${bsClass} alert-fixed shadow`;
      alertDiv.innerHTML = `<div class="d-flex align-items-center"><div class="flex-grow-1">${message}</div><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
      document.body.appendChild(alertDiv);
      setTimeout(() => { if (alertDiv.parentNode) alertDiv.remove(); }, 3500);
      const closeBtn = alertDiv.querySelector('.btn-close');
      if (closeBtn) closeBtn.addEventListener('click', () => alertDiv.remove());
    }
    
    escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
  }
  
  document.addEventListener('DOMContentLoaded', () => {
    new QuizBuilder();
  });
</script>
