<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Редактирование квиза | QuizService</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f8f9fa;
    }
    .container-main {
      flex: 1;
      padding: 2rem 0;
    }
    .quiz-edit-card {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .question-card {
      background: white;
      border-radius: 16px;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .question-card:hover {
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .answer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .correct-radio {
      margin-right: 8px;
    }
    .btn-remove-answer {
      flex-shrink: 0;
    }
    @media (max-width: 768px) {
      .question-card .card-body {
        padding: 1rem;
      }
      .answer-item {
        flex-wrap: wrap;
      }
      .answer-item .form-control {
        flex: 1;
        min-width: 150px;
      }
    }
    footer {
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">QuizService</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="/create">Создать квиз</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container container-main">
    <div class="col-12 col-lg-10 mx-auto">
      <div id="quizEditApp">
        <div v-if="loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2">Загрузка данных квиза...</p>
          <p v-if="loadError" class="text-danger">{{ loadError }}</p>
        </div>

        <div v-else>
          <div class="card quiz-edit-card border-0">
            <div class="card-header bg-white border-0 pt-4 pb-0">
              <h2 class="mb-0 fw-bold">✏Редактирование квиза</h2>
            </div>
            <div class="card-body p-4">
              <div class="mb-4">
                <label class="form-label fw-semibold">Название квиза</label>
                <input type="text" class="form-control form-control-lg" v-model="quiz.title" placeholder="Введите название">
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Описание</label>
                <textarea class="form-control" rows="3" v-model="quiz.description" placeholder="Краткое описание квиза"></textarea>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h4 class="mb-0">Вопросы</h4>
                  <button class="btn btn-sm btn-primary" @click="addQuestion">
                    <i class="bi bi-plus-lg me-1"></i> Добавить вопрос
                  </button>
                </div>

                <div v-for="(question, qIndex) in quiz.questions" :key="question.id" class="question-card card mb-3">
                  <div class="card-body">
                    <div class="d-flex align-items-start gap-2 mb-3">
                      <div class="flex-grow-1">
                        <input type="text" class="form-control" v-model="question.text" placeholder="Текст вопроса">
                      </div>
                      <div class="btn-group" role="group">
                        <button class="btn btn-sm btn-outline-secondary" @click="moveQuestionUp(qIndex)" :disabled="qIndex === 0">
                          <i class="bi bi-arrow-up"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" @click="moveQuestionDown(qIndex)" :disabled="qIndex === quiz.questions.length-1">
                          <i class="bi bi-arrow-down"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" @click="removeQuestion(qIndex)">
                          <i class="bi bi-trash3"></i>
                        </button>
                      </div>
                    </div>

                    <div class="ms-4">
                      <label class="form-label fw-semibold">Варианты ответов</label>
                      <div v-for="(answer, aIdx) in question.answers" :key="aIdx" class="answer-item">
                        <div class="form-check correct-radio">
                          <input class="form-check-input" type="radio" :name="'correct_' + question.id" :value="aIdx" v-model="question.correctAnswer">
                        </div>
                        <input type="text" class="form-control" v-model="question.answers[aIdx]" placeholder="Текст ответа">
                        <button class="btn btn-sm btn-outline-secondary btn-remove-answer" @click="removeAnswer(question, aIdx)" :disabled="question.answers.length <= 1">
                          <i class="bi bi-x-lg"></i>
                        </button>
                      </div>
                      <button class="btn btn-sm btn-link text-primary mt-2" @click="addAnswer(question)">
                        <i class="bi bi-plus-circle me-1"></i> Добавить вариант
                      </button>
                      <div class="text-danger small mt-1" v-if="question.correctAnswer === undefined || question.correctAnswer === null">
                        Выберите правильный ответ
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="d-flex gap-3 justify-content-end mt-4">
                <button class="btn btn-outline-secondary btn-lg px-4" @click="confirmCancel">Отмена</button>
                <button class="btn btn-primary btn-lg px-4" @click="saveQuiz" :disabled="saving">
                  <span v-if="saving" class="spinner-border spinner-border-sm me-2"></span>
                  Сохранить изменения
                </button>
              </div>
            </div>
          </div>

          <div v-if="message" class="alert mt-3" :class="messageType" role="alert">
            {{ message }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white py-3 mt-auto">
    <div class="container text-center">
      <p class="mb-0 small">&copy; 2024 QuizService. Онлайн-платформа для создания и проведения викторин</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const loading = ref(true);
        const saving = ref(false);
        const loadError = ref(null);
        const quiz = ref({
          id: null,
          title: '',
          description: '',
          questions: []
        });
        const message = ref('');
        const messageType = ref('');
        let nextId = 1;

        const loadQuizData = async () => {
          loading.value = true;
          loadError.value = null;
          try {
            await new Promise(resolve => setTimeout(resolve, 800));
            quiz.value = {
              id: 1,
              title: '',
              description: '',
              questions: []
            };
            nextId = 1;
          } catch (err) {
            console.error('Ошибка загрузки:', err);
            loadError.value = 'Не удалось загрузить данные. Попробуйте обновить страницу.';
          } finally {
            loading.value = false;
          }
        };

        const showMessage = (text, type = 'success') => {
          message.value = text;
          messageType.value = `alert-${type}`;
          setTimeout(() => { message.value = ''; }, 3000);
        };

        const addQuestion = () => {
          quiz.value.questions.push({
            id: nextId++,
            text: '',
            answers: ['', ''],
            correctAnswer: 0
          });
        };

        const removeQuestion = (index) => {
          if (confirm('Удалить этот вопрос?')) {
            quiz.value.questions.splice(index, 1);
          }
        };

        const moveQuestionUp = (index) => {
          if (index > 0) {
            const temp = quiz.value.questions[index];
            quiz.value.questions[index] = quiz.value.questions[index-1];
            quiz.value.questions[index-1] = temp;
          }
        };

        const moveQuestionDown = (index) => {
          if (index < quiz.value.questions.length - 1) {
            const temp = quiz.value.questions[index];
            quiz.value.questions[index] = quiz.value.questions[index+1];
            quiz.value.questions[index+1] = temp;
          }
        };

        const addAnswer = (question) => {
          question.answers.push('');
        };

        const removeAnswer = (question, answerIndex) => {
          if (question.answers.length > 1) {
            question.answers.splice(answerIndex, 1);
            if (question.correctAnswer === answerIndex) {
              question.correctAnswer = undefined;
            } else if (question.correctAnswer > answerIndex) {
              question.correctAnswer--;
            }
          }
        };

        const saveQuiz = async () => {
          if (!quiz.value.title.trim()) {
            showMessage('Введите название квиза', 'danger');
            return;
          }
          if (quiz.value.questions.length === 0) {
            showMessage('Добавьте хотя бы один вопрос', 'danger');
            return;
          }
          for (let i = 0; i < quiz.value.questions.length; i++) {
            const q = quiz.value.questions[i];
            if (!q.text.trim()) {
              showMessage(`Вопрос ${i+1}: текст не может быть пустым`, 'danger');
              return;
            }
            if (q.correctAnswer === undefined || q.correctAnswer === null) {
              showMessage(`Вопрос ${i+1}: выберите правильный ответ`, 'danger');
              return;
            }
            for (let a = 0; a < q.answers.length; a++) {
              if (!q.answers[a].trim()) {
                showMessage(`Вопрос ${i+1}: вариант ответа ${a+1} не может быть пустым`, 'danger');
                return;
              }
            }
          }

          saving.value = true;
          try {
            await new Promise(resolve => setTimeout(resolve, 1000));
            console.log('Сохранённые данные:', JSON.parse(JSON.stringify(quiz.value)));
            showMessage('Квиз успешно сохранён!', 'success');
          } catch (err) {
            showMessage('Ошибка сохранения', 'danger');
          } finally {
            saving.value = false;
          }
        };

        const confirmCancel = () => {
          if (confirm('Вы уверены? Все несохранённые изменения будут потеряны.')) {
            window.location.href = '/';
          }
        };

        onMounted(() => {
          loadQuizData();
        });

        return {
          loading,
          saving,
          loadError,
          quiz,
          message,
          messageType,
          addQuestion,
          removeQuestion,
          moveQuestionUp,
          moveQuestionDown,
          addAnswer,
          removeAnswer,
          saveQuiz,
          confirmCancel
        };
      }
    }).mount('#quizEditApp');
  </script>
</body>
</html>
